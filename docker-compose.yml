# 智能设备巡检系统 - Docker Compose 编排
# 服务：PostgreSQL 15 + Redis 7 + MinIO + NestJS + React PC + React H5

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: inspection-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inspection}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inspection123}
      POSTGRES_DB: ${POSTGRES_DB:-inspection_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inspection-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inspection} -d ${POSTGRES_DB:-inspection_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存/队列
  redis:
    image: redis:7-alpine
    container_name: inspection-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - inspection-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: inspection-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - inspection-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MinIO 初始化（创建桶）
  minio-init:
    image: minio/mc:latest
    container_name: inspection-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/$${MINIO_BUCKET:-inspection};
      mc anonymous set download local/$${MINIO_BUCKET:-inspection};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-inspection}
    networks:
      - inspection-net

  # NestJS 后端 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inspection-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - inspection-net

  # React PC 管理端
  frontend-pc:
    build:
      context: ./frontend-pc
      dockerfile: Dockerfile
    container_name: inspection-pc
    restart: unless-stopped
    ports:
      - "${PC_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - inspection-net

  # React H5 移动端
  frontend-h5:
    build:
      context: ./frontend-h5
      dockerfile: Dockerfile
    container_name: inspection-h5
    restart: unless-stopped
    ports:
      - "${H5_PORT:-8081}:80"
    depends_on:
      - backend
    networks:
      - inspection-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  inspection-net:
    driver: bridge
