# Render Blueprint：https://dashboard.render.com → New → Blueprint → 选 yach-997/cursor-fdz
# 带 sync: false 的变量会在部署向导里让你粘贴（切勿把密钥写进本文件）
services:
  - type: web
    name: cursor-fdz-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SYNC
        value: 'true'
      - key: DB_SSL
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: cursor-fdz-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 2h
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_REAL_NAME
        value: 超级管理员
      - key: ADMIN_PHONE
        value: '13800000000'
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: '6379'
      - key: QINIU_ACCESS_KEY
        sync: false
      - key: QINIU_SECRET_KEY
        sync: false
      - key: QINIU_BUCKET
        sync: false
      - key: QINIU_DOMAIN
        sync: false
      - key: QINIU_ZONE
        value: z2
      - key: QINIU_UPLOAD_URL
        value: https://upload-z2.qiniup.com
      - key: VISION_API_KEY
        sync: false
      - key: VISION_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: VISION_MODEL
        value: Qwen/Qwen3-VL-8B-Instruct
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: AMAP_WEB_SERVICE_KEY
        sync: false
      - key: AMAP_WEB_KEY
        sync: false

databases:
  - name: cursor-fdz-db
    plan: free
    databaseName: inspection_db
    user: inspection
