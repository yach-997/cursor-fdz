# Render Blueprint：一键部署 API + Postgres
# 控制台：https://dashboard.render.com → New → Blueprint → 选本仓库
services:
  - type: web
    name: cursor-fdz-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SYNC
        value: 'true'
      - key: DB_SSL
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: cursor-fdz-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 2h
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_REAL_NAME
        value: 超级管理员
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: '6379'
      # 下面几项请在 Render Dashboard 手动填（与本地 .env 一致，勿提交到 Git）
      # QINIU_ACCESS_KEY / QINIU_SECRET_KEY / QINIU_BUCKET / QINIU_DOMAIN / QINIU_ZONE
      # VISION_API_KEY / VISION_BASE_URL / VISION_MODEL
      # AMAP_WEB_SERVICE_KEY / DEEPSEEK_API_KEY

databases:
  - name: cursor-fdz-db
    plan: free
    databaseName: inspection_db
    user: inspection
