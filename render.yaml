# 生产架构：
#   手机/电脑 → Vercel(PC/H5) → Render Nest API → Postgres(推荐 Render；也可用 Neon)
#                              └→ 七牛云（照片）
#
# 部署：https://dashboard.render.com → New → Blueprint → 选 yach-997/cursor-fdz
# sync:false 的项在向导里粘贴，切勿写进本文件或提交 Git
services:
  - type: web
    name: cursor-fdz-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # 首次部署建表+种子；登录正常后请在 Dashboard 改为 false
      - key: DB_SYNC
        value: 'true'
      - key: DB_SSL
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: cursor-fdz-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 2h
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_REAL_NAME
        value: 超级管理员
      - key: ADMIN_PHONE
        value: '13800000000'
      # 未单独部署 Redis 时登录仍可用；AI 异步队列会降级
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: '6379'
      - key: QINIU_ACCESS_KEY
        sync: false
      - key: QINIU_SECRET_KEY
        sync: false
      - key: QINIU_BUCKET
        sync: false
      - key: QINIU_DOMAIN
        sync: false
      - key: QINIU_ZONE
        value: z2
      - key: QINIU_UPLOAD_URL
        value: https://upload-z2.qiniup.com
      - key: VISION_API_KEY
        sync: false
      - key: VISION_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: VISION_MODEL
        value: Qwen/Qwen3-VL-8B-Instruct
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: AMAP_WEB_SERVICE_KEY
        sync: false
      - key: AMAP_WEB_KEY
        sync: false

databases:
  - name: cursor-fdz-db
    # 若账号无 free 库额度，向导会提示升级或改 Neon（见清单说明）
    plan: free
    databaseName: inspection_db
    user: inspection
    postgresMajorVersion: '15'
