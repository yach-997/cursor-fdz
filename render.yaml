# Render Blueprint：只跑 Nest API；数据库用 Supabase Postgres
# https://dashboard.render.com → New → Blueprint → 选 yach-997/cursor-fdz
services:
  - type: web
    name: cursor-fdz-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # 首次连 Supabase 建表+种子；稳定后可改 false
      - key: DB_SYNC
        value: 'true'
      - key: DB_SSL
        value: 'true'
      # 粘贴 Supabase → Database → URI（见下方教学）
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 2h
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_REAL_NAME
        value: 超级管理员
      - key: ADMIN_PHONE
        value: '13800000000'
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: '6379'
      - key: QINIU_ACCESS_KEY
        sync: false
      - key: QINIU_SECRET_KEY
        sync: false
      - key: QINIU_BUCKET
        sync: false
      - key: QINIU_DOMAIN
        sync: false
      - key: QINIU_ZONE
        value: z2
      - key: QINIU_UPLOAD_URL
        value: https://upload-z2.qiniup.com
      - key: VISION_API_KEY
        sync: false
      - key: VISION_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: VISION_MODEL
        value: Qwen/Qwen3-VL-8B-Instruct
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: AMAP_WEB_SERVICE_KEY
        sync: false
      - key: AMAP_WEB_KEY
        sync: false
